
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream dsa_frontend {
    server frontend:3000;
    keepalive 32;
}

upstream dsa_backend {
    server backend:4000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;
    server_tokens off;
    client_max_body_size 2m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;

    # A lightweight probe for container orchestration. The API has its own
    # readiness endpoint at /api/v1/health, used by the backend healthcheck.
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Keep the full /api/v1/... request URI intact for Express.
    location /api/ {
        proxy_pass http://dsa_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location / {
        proxy_pass http://dsa_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
